appId: com.stockflow.pos
productName: StockFlow POS
copyright: Copyright 2026 StockFlow
directories:
  output: release
  buildResources: assets
  app: .
files:
  - dist-electron/**/*
  - electron/**/*
  - main.js
  - package.json
asar: true
asarUnpack:
  - dist-electron/**/*
  - electron/**/*
npmRebuild: false
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: StockFlow POS
publish: null
